map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream slots-nuxt {
    server 127.0.0.1:3000 max_fails=1 fail_timeout=15s;
}

upstream slots-introspector {
    server 127.0.0.1:8080;
    keepalive 400;
}

upstream slots-introspector-sock {
    server unix:/tmp/introspector.sock;
    keepalive 400;
}

upstream api-slots-rust-resource {
    server 127.0.0.1:8081 max_fails=1 fail_timeout=15s;
}

upstream api-slots-octane-resource {
    server 127.0.0.1:8006 max_fails=1 fail_timeout=15s;
}

upstream api-slots-fpm-resource {
    # /etc/php/php-fpm.d/www.conf
    server unix:/run/php-fpm/php-fpm.sock;
}

server {
    listen 80;
    listen [::]:80;
    server_name slots.localhost slots.test;
    server_tokens off;
    root /var/www/nuxt-laravel-auth/.output/public;

    index index.html;

    access_log /var/log/nginx/slots.access_log;
    error_log /var/log/nginx/slots.error_log;

    location /index.html {
        try_files "" @nuxt;
    }

    location / {
        try_files $uri $uri/ @nuxt;
    }

    location ~* ^/_nuxt/.* {
        try_files "" @nuxt;
    }

    location /_nuxt/ {
        try_files "" @nuxt;
    }

    location = /favicon.ico {
        access_log off; log_not_found off;

        try_files $uri @static-dev;
    }
    location = /robots.txt {
        access_log off; log_not_found off;

        try_files $uri @static-dev;
    }

    location @nuxt {
        set $suffix "";

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Scheme $scheme;
        proxy_set_header SERVER_PORT $server_port;
        proxy_set_header REMOTE_ADDR $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_pass http://slots-nuxt$suffix;

        proxy_connect_timeout 30s;

        proxy_read_timeout 30s;
        proxy_send_timeout 30s;

        # Buffering off for streaming responses
        proxy_buffering off;
        add_header X-Debug-Handler "Nuxt upstream" always;

        error_page 502 503 504 = @static;
    }

    location @static {
        try_files /200.html /404.html;

        add_header X-Debug-Handler "Static fallback" always;
    }

    location @static-dev {
        root /var/www/nuxt-laravel-auth/public;

        try_files $uri $uri/ @static;

        add_header X-Debug-Handler "Static dev fallback" always;
    }

    location = /introspector-auth {
        internal;  # <-- CRITICAL: This endpoint is NOT exposed to the public
        proxy_pass http://slots-introspector/introspect-http;
        # proxy_pass http://slots-introspector-sock/introspect-http;

        proxy_set_header Content-Length "";
        proxy_set_header X-Gateway-Secret "introspector GATEWAY_SECRET";
        proxy_set_header X-Token $http_authorization;

        # not required. No query, no body
        # proxy_method POST;
        # much slower than X-Token header
        # proxy_set_body "token=$http_authorization";

        # Headers the introspector returns (JSON body is ignored by auth_request)
        # We'll capture these with $upstream_http_*
        proxy_pass_header X-Sub;
        proxy_pass_header X-Aud;
        proxy_pass_header X-Scope;

        proxy_pass_request_body off;

        # slower than internal introspector cache: local filesystem vs in memory LRU
        # proxy_cache introspection_cache;
        # proxy_cache_key "$http_authorization";
        # proxy_cache_valid 200 5s;
        # proxy_cache_valid 401 5s;
        # proxy_cache_valid 403 0s;
        # proxy_cache_use_stale error timeout updating;
    }

    # This approach will lead to backend body issues
    # location @introspector_error {
    #     default_type application/json;
    #     if ($auth_proxy_status = 400) {
    #         add_header X-Debug-Handler "Introspector bad request" always;
    #         return 401 '{"message":"Unauthorized"}';
    #     }
    #     if ($auth_proxy_status = 401) {
    #         add_header X-Debug-Handler "Introspector unauthorized" always;
    #         return 401 '{"message":"Unauthorized"}';
    #     }
    #     if ($auth_proxy_status = 403) {
    #         add_header X-Debug-Handler "Introspector forbidden" always;
    #         return 502 '{"message":"Bad Gateway"}';
    #     }
    #     if ($auth_proxy_status = 500) {
    #         add_header X-Debug-Handler "Introspector unavailable" always;
    #         return 502 '{"message":"Bad Gateway"}';
    #     }
    #     if ($auth_proxy_status = 502) {
    #         add_header X-Debug-Handler "Introspector bad gateway" always;
    #         return 502 '{"message":"Bad Gateway"}';
    #     }
    #     if ($auth_proxy_status = 503) {
    #         add_header X-Debug-Handler "Introspector unavailable" always;
    #         return 502 '{"message":"Bad Gateway"}';
    #     }
    #     add_header X-Debug-Handler "@introspector_error" always;
    # }

    # Check if Laravel uses real user IP instead of proxy
    location /ip {
        # The rules are checked in sequence until the first match is found
        allow ::1;
        allow 127.0.0.1;
        allow 192.168.0.0/24;
        deny  all;

        add_header X-Debug-Remote-Addr $remote_addr always;
        add_header X-Debug-Server-Addr $server_addr always;

        try_files "" @nuxt;
    }

    location /api/ {
        # This triggers the internal /auth request BEFORE handling the request
        auth_request /introspector-auth;

        auth_request_set $user_id $upstream_http_x_sub;
        auth_request_set $client_id $upstream_http_x_aud;
        auth_request_set $token_scopes $upstream_http_x_scope;

        rewrite ^/api/(.*) /$1 break;

        add_header X-Debug-Handler "location /api" always;

        # can do file lookup
        try_files "" @rust;

        # Will prevent showing errors from services (@rust, @octane, @fpm blocks)
        # @introspector_error will lose original error
        # So better rely on built in nginx error pages for auth_request
        # auth_request_set $auth_proxy_status $upstream_status;
        # add_header X-Debug-Introspection-Status $auth_proxy_status always;
        # recursive_error_pages on;
        # proxy_intercept_errors on;
        # error_page 401 404 500 = @introspector_error;

        # breaks headers and 404 on 500
        # error_page 418 = @octane;
        # return 418;
    }

    location @rust {
        set $suffix "";

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Scheme $scheme;
        proxy_set_header SERVER_PORT $server_port;
        proxy_set_header REMOTE_ADDR $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header X-Gateway-Secret "rust-app-secret";
        proxy_set_header X-User-Id $user_id;
        proxy_set_header X-Client-Id $client_id;
        proxy_set_header X-Token-Scopes $token_scopes;

        proxy_pass http://api-slots-rust-resource$suffix;

        proxy_connect_timeout 30s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;

        add_header X-Handler "Rust upstream" always;

        error_page 502 503 504 = @octane;
    }

    location @octane {
        root /var/www/slots/public;

        set $suffix "";

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Scheme $scheme;
        proxy_set_header SERVER_PORT $server_port;
        proxy_set_header REMOTE_ADDR $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header X-Gateway-Secret "octane-app-secret";
        proxy_set_header X-User-Id $user_id;
        proxy_set_header X-Client-Id $client_id;
        proxy_set_header X-Token-Scopes $token_scopes;

        proxy_pass http://api-slots-octane-resource$suffix;

        proxy_connect_timeout 30s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;

        add_header X-Handler "Octane upstream" always;

        error_page 502 503 504 = @fpm;
    }

    location @fpm {
        root /var/www/slots/public;

        include /etc/nginx/fastcgi_params;

        fastcgi_param HTTP_X_GATEWAY_SECRET "fpm/octane-app-secret";
        fastcgi_param HTTP_X_USER_ID $user_id;
        fastcgi_param HTTP_X_CLIENT_ID $client_id;
        fastcgi_param HTTP_X_TOKEN_SCOPES $token_scopes;
        fastcgi_hide_header X-Powered-By;

        fastcgi_param SCRIPT_FILENAME $realpath_root/index.php;
        fastcgi_param REQUEST_URI $uri?$args;

        fastcgi_connect_timeout 30s;
        fastcgi_send_timeout 60s;
        fastcgi_read_timeout 60s;

        fastcgi_pass api-slots-fpm-resource;

        add_header X-Debug-Handler "PHP FPM API upstream" always;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }
}
